<!-- @dsCard group="Type" viewport="700x140" name="Monospace" subtitle="JetBrains Mono — code, technical labels, tokens" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 20px 24px; }
.code-block { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 16px 18px; }
.code-line { font-family: var(--font-mono); font-size: var(--text-sm); line-height: 1.8; }
.kw  { color: rgba(255,255,255,0.5); }
.val { color: #FFFFFF; }
.str { color: rgba(255,255,255,0.7); }
.meta { font-size: 11px; color: var(--color-fg-tertiary); margin-top: 10px; font-family: var(--font-mono); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="code-block">
    <div class="code-line"><span class="kw">--color-fg:</span> <span class="str">#FFFFFF</span><span class="kw">;</span></div>
    <div class="code-line"><span class="kw">--font-display:</span> <span class="str">'Space Grotesk'</span><span class="kw">, system-ui;</span></div>
    <div class="code-line"><span class="kw">--space-8:</span> <span class="val">32px</span><span class="kw">;</span></div>
  </div>
  <div class="meta">JetBrains Mono · 400 · 14px · 1.8 leading</div>
</body>
</html>
