<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px 24px 20px; }
.hero  { font-family: var(--font-display); font-size: var(--text-7xl); font-weight: 800; letter-spacing: var(--tracking-tightest); line-height: var(--leading-tight); color: var(--color-fg); }
.sub   { font-family: var(--font-display); font-size: var(--text-3xl); font-weight: 600; letter-spacing: var(--tracking-tight); line-height: var(--leading-snug); color: var(--color-fg-secondary); margin-top: 4px; }
.meta  { font-size: 11px; color: var(--color-fg-tertiary); font-family: var(--font-mono); margin-top: 12px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="hero">Build websites that close.</div>
  <div class="sub">Premium creative for founders.</div>
  <div class="meta">Space Grotesk · 800 · −0.04em tracking · 1.1 line-height</div>
</body>
</html>
