<!-- @dsCard group="Colors" viewport="700x160" name="Functional Colors" subtitle="Success, warning, danger semantic tokens" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 20px; }
.row { display: flex; gap: 12px; }
.swatch { flex: 1; border-radius: var(--radius-md); background: var(--color-surface); border: 1px solid var(--color-border); padding: 14px 12px; display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; }
.dot { width: 32px; height: 32px; border-radius: 50%; margin-bottom: 10px; }
.swatch-label { font-size: 10px; color: var(--color-fg-tertiary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
.swatch-name  { font-size: 13px; font-weight: 500; }
.swatch-hex   { font-size: 10px; font-family: var(--font-mono); margin-top: 6px; color: var(--color-fg-tertiary); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="dot" style="background:#4ADE80"></div>
    <div><div class="swatch-label">--color-success</div><div class="swatch-name" style="color:#4ADE80">Success</div></div>
    <div class="swatch-hex">#4ADE80</div>
  </div>
  <div class="swatch" style="background:rgba(74,222,128,0.05)">
    <div class="dot" style="background:rgba(74,222,128,0.15)"></div>
    <div><div class="swatch-label">--color-success-subtle</div><div class="swatch-name" style="color:#4ADE80">Success Subtle</div></div>
    <div class="swatch-hex">rgba(74,222,128,0.1)</div>
  </div>
  <div class="swatch">
    <div class="dot" style="background:#FBBF24"></div>
    <div><div class="swatch-label">--color-warning</div><div class="swatch-name" style="color:#FBBF24">Warning</div></div>
    <div class="swatch-hex">#FBBF24</div>
  </div>
  <div class="swatch">
    <div class="dot" style="background:#F87171"></div>
    <div><div class="swatch-label">--color-danger</div><div class="swatch-name" style="color:#F87171">Danger</div></div>
    <div class="swatch-hex">#F87171</div>
  </div>
  <div class="swatch" style="background:rgba(248,113,113,0.05)">
    <div class="dot" style="background:rgba(248,113,113,0.15)"></div>
    <div><div class="swatch-label">--color-danger-subtle</div><div class="swatch-name" style="color:#F87171">Danger Subtle</div></div>
    <div class="swatch-hex">rgba(248,113,113,0.1)</div>
  </div>
</div>
</body>
</html>
