<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & Elevation" subtitle="Dark-optimised shadow stack — minimal by design" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg-elevated); font-family: var(--font-body); padding: 28px 24px; }
.row { display: flex; gap: 16px; align-items: center; }
.card { background: var(--color-surface); border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100px; height: 80px; border: 1px solid var(--color-border); }
.label { font-size: 10px; font-family: var(--font-mono); color: var(--color-fg-tertiary); margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div>
    <div class="card" style="box-shadow:none; border-color:var(--color-border)"></div>
    <div class="label">none</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-xs)"></div>
    <div class="label">shadow-xs</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-sm)"></div>
    <div class="label">shadow-sm</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-md)"></div>
    <div class="label">shadow-md</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-lg)"></div>
    <div class="label">shadow-lg</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-xl)"></div>
    <div class="label">shadow-xl</div>
  </div>
  <div>
    <div class="card" style="box-shadow:var(--shadow-focus)"></div>
    <div class="label">focus ring</div>
  </div>
</div>
</body>
</html>
