<!-- @dsCard group="Spacing" viewport="700x160" name="Border Radius" subtitle="Radius system from sm (4px) to full (pill)" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; }
.row { display: flex; gap: 20px; align-items: center; }
.shape { background: var(--color-surface); border: 1px solid var(--color-border-strong); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; height: 80px; }
.label { font-size: 10px; font-family: var(--font-mono); color: var(--color-fg-tertiary); margin-top: 8px; text-align: center; white-space: nowrap; }
.val   { font-size: 11px; color: var(--color-fg-secondary); margin-top: 2px; text-align: center; }
</style>
</head>
<body>
<div class="row">
  <div><div class="shape" style="border-radius:var(--radius-sm)"></div><div class="label">--radius-sm</div><div class="val">4px</div></div>
  <div><div class="shape" style="border-radius:var(--radius-md)"></div><div class="label">--radius-md</div><div class="val">8px</div></div>
  <div><div class="shape" style="border-radius:var(--radius-lg)"></div><div class="label">--radius-lg</div><div class="val">12px</div></div>
  <div><div class="shape" style="border-radius:var(--radius-xl)"></div><div class="label">--radius-xl</div><div class="val">16px</div></div>
  <div><div class="shape" style="border-radius:var(--radius-2xl)"></div><div class="label">--radius-2xl</div><div class="val">24px</div></div>
  <div><div class="shape" style="border-radius:var(--radius-full); width:80px;height:36px;"></div><div class="label">--radius-full</div><div class="val">9999px</div></div>
</div>
</body>
</html>
