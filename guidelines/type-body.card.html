<!-- @dsCard group="Type" viewport="700x200" name="Body Type" subtitle="Inter — body copy, UI labels, captions" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; }
.row { display: flex; gap: 32px; }
.col { flex: 1; }
.body-lg  { font-size: var(--text-lg); line-height: var(--leading-relaxed); color: var(--color-fg-secondary); }
.label    { font-size: var(--text-xs); font-weight: 500; text-transform: uppercase; letter-spacing: var(--tracking-wider); color: var(--color-fg-tertiary); margin-bottom: 6px; }
.ui-label { font-size: var(--text-sm); font-weight: 500; color: var(--color-fg); }
.caption  { font-size: var(--text-xs); color: var(--color-fg-tertiary); line-height: 1.5; margin-top: 8px; }
.divider  { width: 1px; background: var(--color-border); }
</style>
</head>
<body>
<div class="row">
  <div class="col">
    <div class="label">Body / 18px</div>
    <div class="body-lg">We help founders launch premium digital experiences — faster, with better conversion.</div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="label">UI Label / 14px</div>
    <div class="ui-label">Performance Marketing</div>
    <div class="caption">Inter · 400/500 · 0.65 opacity secondary · 1.6 line-height</div>
  </div>
</div>
</body>
</html>
