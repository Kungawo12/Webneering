<!-- @dsCard group="Brand" viewport="700x160" name="Logo" subtitle="House of UGC wordmark and logotype" -->
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; background: var(--color-bg); font-family: var(--font-body); padding: 24px; display: flex; align-items: center; gap: 48px; height: 160px; box-sizing: border-box; }
.logo-full { display: flex; flex-direction: column; gap: 2px; }
.logo-mark { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -0.04em; color: var(--color-fg); line-height: 1; }
.logo-sub  { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-fg-tertiary); }
.divider   { width: 1px; height: 80px; background: var(--color-border); }
.on-light  { background: #FFFFFF; border-radius: var(--radius-md); padding: 16px 24px; display: flex; flex-direction: column; gap: 2px; }
.logo-mark-dark { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: -0.04em; color: #0A0A0A; line-height: 1; }
.logo-sub-dark  { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(10,10,10,0.4); font-family: var(--font-body); }
</style>
</head>
<body>
  <div class="logo-full">
    <div class="logo-mark">House of UGC</div>
    <div class="logo-sub">Creative Agency</div>
  </div>
  <div class="divider"></div>
  <div class="on-light">
    <div class="logo-mark-dark">House of UGC</div>
    <div class="logo-sub-dark">Creative Agency</div>
  </div>
</body>
</html>
